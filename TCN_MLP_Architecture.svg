<svg viewBox="0 0 1400 1600" xmlns="http://www.w3.org/2000/svg" style="background-color: #1a1a1a; font-family: 'Segoe UI', Arial, sans-serif;">
  <!-- Title -->
  <text x="700" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#ffffff">
    TCN-MLP Hybrid Architecture (4-Crop Yield Prediction)
  </text>
  
  <!-- ========== INPUTS ========== -->
  <g id="inputs">
    <!-- Sequence Input -->
    <rect x="50" y="100" width="200" height="60" fill="#1f77b4" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="150" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Sequence Input</text>
    <text x="150" y="155" font-size="11" text-anchor="middle" fill="#e0e0e0">(12, 3) months × features</text>
    
    <!-- Region Input -->
    <rect x="300" y="100" width="180" height="60" fill="#2ca02c" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="390" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Region Input</text>
    <text x="390" y="155" font-size="11" text-anchor="middle" fill="#e0e0e0">6 regions (categorical)</text>
    
    <!-- Crop Input -->
    <rect x="550" y="100" width="180" height="60" fill="#2ca02c" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="640" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Crop Input</text>
    <text x="640" y="155" font-size="11" text-anchor="middle" fill="#e0e0e0">4 crops (categorical)</text>
    
    <!-- Year Input -->
    <rect x="800" y="100" width="180" height="60" fill="#ff7f0e" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="890" y="135" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Year Input</text>
    <text x="890" y="155" font-size="11" text-anchor="middle" fill="#e0e0e0">Polynomial + interactions</text>
  </g>
  
  <!-- ========== TCN BRANCH ========== -->
  <g id="tcn-branch">
    <!-- Gaussian Noise -->
    <rect x="30" y="220" width="220" height="60" fill="#6c757d" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="140" y="250" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Gaussian Noise Injection</text>
    <text x="140" y="270" font-size="11" text-anchor="middle" fill="#e0e0e0">σ = 0.05</text>
    <line x1="150" y1="100" x2="140" y2="220" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="5,5"/>
    
    <!-- Causal Conv1D -->
    <rect x="30" y="330" width="220" height="60" fill="#9467bd" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="140" y="355" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Causal Conv1D</text>
    <text x="140" y="375" font-size="11" text-anchor="middle" fill="#e0e0e0">28 filters, kernel=3</text>
    <line x1="140" y1="280" x2="140" y2="330" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Batch Norm + Dropout -->
    <rect x="30" y="440" width="220" height="60" fill="#6c757d" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="140" y="465" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Batch Norm + Dropout</text>
    <text x="140" y="485" font-size="11" text-anchor="middle" fill="#e0e0e0">dropout = 0.25</text>
    <line x1="140" y1="390" x2="140" y2="440" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Skip Connection Note -->
    <rect x="270" y="440" width="120" height="60" fill="#95b8d1" stroke="#888888" stroke-width="1.5" rx="5" stroke-dasharray="3,3"/>
    <text x="330" y="470" font-size="11" text-anchor="middle" fill="#ffffff">Skip</text>
    <text x="330" y="485" font-size="10" text-anchor="middle" fill="#e0e0e0">connection</text>
    <line x1="270" y1="470" x2="250" y2="470" stroke="#888888" stroke-width="1.5" stroke-dasharray="3,3"/>
    
    <!-- Multi-Head Attention -->
    <rect x="30" y="550" width="220" height="70" fill="#d62728" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="140" y="580" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Multi-Head Self-Attention</text>
    <text x="140" y="605" font-size="11" text-anchor="middle" fill="#e0e0e0">4 heads, key_dim=8</text>
    <line x1="140" y1="500" x2="140" y2="550" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Residual Add -->
    <rect x="30" y="660" width="220" height="50" fill="#95b8d1" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="140" y="690" font-size="12" text-anchor="middle" fill="#ffffff">Residual Add + BatchNorm</text>
    <line x1="140" y1="620" x2="140" y2="660" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Global Average Pooling -->
    <rect x="30" y="750" width="220" height="60" fill="#17becf" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="140" y="780" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Global Average Pooling</text>
    <text x="140" y="800" font-size="11" text-anchor="middle" fill="#e0e0e0">Output: 28-dim vector</text>
    <line x1="140" y1="710" x2="140" y2="750" stroke="#ffffff" stroke-width="2"/>
  </g>
  
  <!-- ========== CATEGORICAL BRANCHES ========== -->
  <g id="categorical-branches">
    <!-- Region Embedding -->
    <rect x="300" y="330" width="180" height="60" fill="#2ca02c" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="390" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Region Embedding</text>
    <text x="390" y="380" font-size="10" text-anchor="middle" fill="#e0e0e0">6 → 7 dims</text>
    <line x1="390" y1="160" x2="390" y2="330" stroke="#ffffff" stroke-width="1.5"/>
    
    <!-- Region Flatten -->
    <rect x="300" y="430" width="180" height="50" fill="#66bb6a" stroke="#ffffff" stroke-width="1.5" rx="5"/>
    <text x="390" y="460" font-size="11" text-anchor="middle" fill="#ffffff">Flatten</text>
    <line x1="390" y1="390" x2="390" y2="430" stroke="#ffffff" stroke-width="1.5"/>
    
    <!-- Crop Embedding -->
    <rect x="540" y="330" width="180" height="60" fill="#2ca02c" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="630" y="360" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Crop Embedding</text>
    <text x="630" y="380" font-size="10" text-anchor="middle" fill="#e0e0e0">4 → 4 dims</text>
    <line x1="640" y1="160" x2="630" y2="330" stroke="#ffffff" stroke-width="1.5"/>
    
    <!-- Crop Flatten -->
    <rect x="540" y="430" width="180" height="50" fill="#66bb6a" stroke="#ffffff" stroke-width="1.5" rx="5"/>
    <text x="630" y="460" font-size="11" text-anchor="middle" fill="#ffffff">Flatten</text>
    <line x1="630" y1="390" x2="630" y2="430" stroke="#ffffff" stroke-width="1.5"/>
  </g>
  
  <!-- ========== TREND BRANCH ========== -->
  <g id="trend-branch">
    <!-- Year Trend Path -->
    <line x1="890" y1="160" x2="780" y2="220" stroke="#ff7f0e" stroke-width="1.5"/>
    
    <!-- Dense(16) -->
    <rect x="700" y="220" width="160" height="60" fill="#ff7f0e" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="780" y="250" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Dense(16)</text>
    <text x="780" y="270" font-size="10" text-anchor="middle" fill="#e0e0e0">ReLU + BatchNorm</text>
    
    <!-- Dropout -->
    <rect x="700" y="330" width="160" height="50" fill="#ffb347" stroke="#ffffff" stroke-width="1.5" rx="5"/>
    <text x="780" y="360" font-size="11" text-anchor="middle" fill="#ffffff">Dropout (0.25)</text>
    <line x1="780" y1="280" x2="780" y2="330" stroke="#ffffff" stroke-width="1.5"/>
  </g>
  
  <!-- ========== CONCATENATION ========== -->
  <g id="concatenation">
    <!-- Connection lines to concatenate -->
    <line x1="140" y1="810" x2="550" y2="920" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="390" y1="480" x2="550" y2="920" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="630" y1="480" x2="550" y2="920" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="780" y1="380" x2="550" y2="920" stroke="#ffffff" stroke-width="1.5"/>
    
    <!-- Concatenate Box -->
    <rect x="400" y="920" width="300" height="60" fill="#8b7500" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="550" y="950" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Concatenate All Inputs</text>
    <text x="550" y="970" font-size="11" text-anchor="middle" fill="#e0e0e0">[28 + 7 + 4 + 16] = 55-dim</text>
  </g>
  
  <!-- ========== MLP LAYERS ========== -->
  <g id="mlp-layers">
    <!-- Dense Layer 1 -->
    <rect x="420" y="1040" width="260" height="70" fill="#c85a54" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="550" y="1065" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Dense Layer 1</text>
    <text x="550" y="1085" font-size="11" text-anchor="middle" fill="#e0e0e0">20 neurons, ReLU + BatchNorm + Dropout</text>
    <text x="550" y="1100" font-size="10" text-anchor="middle" fill="#e0e0e0">L2 = 1e-3, dropout = 0.25</text>
    <line x1="550" y1="980" x2="550" y2="1040" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Dense Layer 2 -->
    <rect x="420" y="1160" width="260" height="70" fill="#c85a54" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="550" y="1185" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Dense Layer 2</text>
    <text x="550" y="1205" font-size="11" text-anchor="middle" fill="#e0e0e0">14 neurons, ReLU + BatchNorm + Dropout</text>
    <text x="550" y="1220" font-size="10" text-anchor="middle" fill="#e0e0e0">L2 = 1e-3, dropout = 0.25</text>
    <line x1="550" y1="1110" x2="550" y2="1160" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Output Layer -->
    <rect x="420" y="1280" width="260" height="70" fill="#1f77b4" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="550" y="1305" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Output Neuron</text>
    <text x="550" y="1325" font-size="11" text-anchor="middle" fill="#e0e0e0">Linear activation, bias = 7.5</text>
    <text x="550" y="1340" font-size="10" text-anchor="middle" fill="#e0e0e0">Predicts log-yield (raw output)</text>
    <line x1="550" y1="1230" x2="550" y2="1280" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Exponential Transform -->
    <rect x="420" y="1400" width="260" height="60" fill="#2ca02c" stroke="#ffffff" stroke-width="2" rx="5"/>
    <text x="550" y="1425" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Exponential Transform</text>
    <text x="550" y="1445" font-size="11" text-anchor="middle" fill="#e0e0e0">exp(output) → yield (kg/ha)</text>
    <line x1="550" y1="1350" x2="550" y2="1400" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Final Output -->
    <rect x="420" y="1510" width="260" height="60" fill="#17becf" stroke="#ffffff" stroke-width="3" rx="5"/>
    <text x="550" y="1535" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Final Prediction: Yield (kg/ha)</text>
    <text x="550" y="1555" font-size="11" text-anchor="middle" fill="#e0e0e0">Test R² = 0.889, MAE = 721.99</text>
    <line x1="550" y1="1460" x2="550" y2="1510" stroke="#ffffff" stroke-width="2"/>
  </g>
  
  <!-- ========== LEGEND ========== -->
  <g id="legend">
    <!-- Background -->
    <rect x="1050" y="100" width="320" height="300" fill="#2a2a2a" stroke="#666666" stroke-width="1" rx="5" opacity="0.9"/>
    
    <text x="1210" y="125" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Model Configuration</text>
    
    <text x="1060" y="155" font-size="11" fill="#e0e0e0">• TCN Filters: 28</text>
    <text x="1060" y="175" font-size="11" fill="#e0e0e0">• Kernel Size: 3 (causal)</text>
    <text x="1060" y="195" font-size="11" fill="#e0e0e0">• Attention Heads: 4</text>
    <text x="1060" y="215" font-size="11" fill="#e0e0e0">• L2 Regularization: 1e-3</text>
    <text x="1060" y="235" font-size="11" fill="#e0e0e0">• Dropout Rate: 0.25</text>
    <text x="1060" y="255" font-size="11" fill="#e0e0e0">• Loss Function: Huber (δ=0.2)</text>
    <text x="1060" y="275" font-size="11" fill="#e0e0e0">• Optimizer: AdamW</text>
    <text x="1060" y="295" font-size="11" fill="#e0e0e0">• Learning Rate: 8e-4</text>
    <text x="1060" y="315" font-size="11" fill="#e0e0e0">• Dataset: 4 crops, 6 regions</text>
    <text x="1060" y="335" font-size="11" fill="#e0e0e0">• Train/Val/Test: 510/90/90</text>
    <text x="1060" y="355" font-size="11" fill="#e0e0e0">• CV 5-fold: 0.829 ± 0.113</text>
  </g>
  
  <!-- ========== FEATURE SUMMARY ========== -->
  <g id="features">
    <rect x="1050" y="450" width="320" height="220" fill="#2a2a2a" stroke="#666666" stroke-width="1" rx="5" opacity="0.9"/>
    
    <text x="1210" y="475" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Input Features (12 months)</text>
    
    <text x="1060" y="505" font-size="11" fill="#ffcccc" font-weight="bold">Temporal (TCN):</text>
    <text x="1070" y="525" font-size="10" fill="#e0e0e0">• T2M_AVG (Temperature avg)</text>
    <text x="1070" y="545" font-size="10" fill="#e0e0e0">• PRECTOTCORR (Rainfall)</text>
    <text x="1070" y="565" font-size="10" fill="#e0e0e0">• GWETROOT (Soil moisture)</text>
    
    <text x="1060" y="595" font-size="11" fill="#ccffcc" font-weight="bold">Categorical:</text>
    <text x="1070" y="615" font-size="10" fill="#e0e0e0">• Region (6 zones)</text>
    <text x="1070" y="635" font-size="10" fill="#e0e0e0">• Crop (Maize, Rice, Cassava, Yam)</text>
    
    <text x="1060" y="665" font-size="11" fill="#ffffcc" font-weight="bold">Year Features:</text>
    <text x="1070" y="685" font-size="10" fill="#e0e0e0">• Polynomial (1°, 2°, 3°)</text>
    <text x="1070" y="705" font-size="10" fill="#e0e0e0">• Region×Year interactions (6)</text>
  </g>
  
  <!-- ========== ARCHITECTURE RATIONALE ========== -->
  <g id="rationale">
    <rect x="1050" y="720" width="320" height="160" fill="#2a2a2a" stroke="#666666" stroke-width="1" rx="5" opacity="0.9"/>
    
    <text x="1210" y="745" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Why This Architecture?</text>
    
    <text x="1065" y="770" font-size="9.5" fill="#e0e0e0">
      <tspan x="1065" dy="0">✓ TCN: Captures seasonal climate</tspan>
      <tspan x="1065" dy="16">✓ Attention: Long-range dependencies</tspan>
      <tspan x="1065" dy="16">✓ Embeddings: Categorical feature learning</tspan>
      <tspan x="1065" dy="16">✓ MLP: Non-linear feature interactions</tspan>
      <tspan x="1065" dy="16">✓ Trend branch: Decouples temporal trends</tspan>
      <tspan x="1065" dy="16">✓ Huber loss: Robust to outliers</tspan>
    </text>
  </g>
</svg>